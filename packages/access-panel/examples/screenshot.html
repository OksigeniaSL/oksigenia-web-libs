<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>access-panel screenshot</title>
  <style>
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      background: linear-gradient(135deg, #1a1f2e 0%, #0a0a0a 100%);
    }
    /* Empty body so panel + trigger are the visual focus. */
  </style>
</head>
<body>
  <oksigenia-access-panel
    locale="en"
    position="mid-left"
    trigger-icon="vitruvian"></oksigenia-access-panel>
  <script type="module" src="../dist/web-component.js"></script>
  <script>
    customElements.whenDefined('oksigenia-access-panel').then(() => {
      // Wait one microtask so the element finishes attaching shadow + bindings.
      requestAnimationFrame(() => {
        const host = document.querySelector('oksigenia-access-panel');
        const trigger = host?.shadowRoot?.getElementById('oks-trigger');
        trigger?.click();
        // Mark page as ready for the screenshot harness.
        document.title = 'access-panel screenshot (ready)';
      });
    });
  </script>
</body>
</html>
