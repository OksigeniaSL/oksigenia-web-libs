name: Feature request
description: Suggest a new feature, locale, or improvement.
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@oksigenia/share"
        - "@oksigenia/access-panel"
        - "new package idea"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
