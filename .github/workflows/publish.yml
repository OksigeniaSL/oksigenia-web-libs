name: Publish

# Publica paquetes a npm usando Trusted Publishing (OIDC). Sin tokens.
#
# Dispara de dos formas:
#  1. Push de tag con prefijo "v" (p. ej. v0.4.0) → cada paquete consulta
#     npm; si su versión local en package.json ya está publicada, se salta
#     (no es error). Solo publica los que tengan una versión nueva. Esto
#     permite tagear sin coordinar el bump simultáneo de todos los paquetes.
#  2. Manual workflow_dispatch con input "package" (access-panel | share |
#     both) → fuerza ese paquete, también con la guarda anti-duplicado.
#  3. No hay despacho automático sin acción humana.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Qué paquete publicar (access-panel | share | both)'
        required: true
        type: choice
        options:
          - access-panel
          - share
          - both

permissions:
  contents: read
  id-token: write   # imprescindible para Trusted Publishing OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        # Version se lee de "packageManager" en el package.json raíz.
        uses: pnpm/action-setup@v6

      - name: Setup Node
        # NO especificar registry-url aquí: para Trusted Publishing con OIDC
        # npm detecta el id-token de GHA automáticamente y publica sin que
        # haga falta NODE_AUTH_TOKEN ni un .npmrc con auth string.
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Upgrade npm to latest (Trusted Publishing requires 11.5.1+)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Verify dist directories
        run: |
          for pkg in access-panel share; do
            if [ ! -s "packages/$pkg/dist/index.js" ] && [ ! -s "packages/$pkg/dist/web-component.js" ]; then
              echo "ERROR: packages/$pkg/dist está vacío. Aborta."
              exit 1
            fi
          done

      - name: Publish access-panel
        if: ${{ github.event_name == 'push' || github.event.inputs.package == 'access-panel' || github.event.inputs.package == 'both' }}
        working-directory: packages/access-panel
        run: |
          PKG=$(node -p "require('./package.json').name")
          LOCAL=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${LOCAL}" version >/dev/null 2>&1; then
            echo "${PKG}@${LOCAL} already on npm — skipping."
          else
            npm publish --provenance --access public
          fi

      - name: Publish share
        if: ${{ github.event_name == 'push' || github.event.inputs.package == 'share' || github.event.inputs.package == 'both' }}
        working-directory: packages/share
        run: |
          PKG=$(node -p "require('./package.json').name")
          LOCAL=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${LOCAL}" version >/dev/null 2>&1; then
            echo "${PKG}@${LOCAL} already on npm — skipping."
          else
            npm publish --provenance --access public
          fi
